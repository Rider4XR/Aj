<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Rider4XR | Rider</title><link rel="stylesheet" href="style.css" /></head>
<body>
  <header class="topbar"><div class="logo-mark small">R4</div><strong>Rider Panel</strong><a href="index.html">Login</a></header>
  <main class="app-grid">
    <section class="panel">
      <h1>Rider Dashboard</h1>
      <div class="switch-row"><span>Status</span><button id="onlineBtn" class="primary">Go Online</button></div>
      <div class="earn-card"><span>Today Earnings</span><strong id="earningText">₹0</strong></div>
      <h2>New Orders</h2>
      <div id="ringBox" class="ring hidden">🔔 New Booking Ringing...</div>
      <div id="ordersList" class="orders-list"><p class="muted">Online hone ke baad orders yahan aayenge.</p></div>
      <h2>Apply / Documents</h2>
      <input placeholder="Driving Licence Number" /><input placeholder="Vehicle Number" /><button class="ghost">Save Documents</button>
    </section>
    <section class="map-panel"><div id="map"></div><div class="tracking-card"><strong>Rider Location</strong><span>Location permission allow karna.</span></div></section>
  </main>
  <audio id="ringAudio" loop><source src="ring.mp3" type="audio/mpeg"></audio>
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="rider.js"></script>
</body></html>
